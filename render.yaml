services:
  - type: web
    name: ssahim-backend
    runtime: python
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: halal_terminal_api_key
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
